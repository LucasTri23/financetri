<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Controle Financeiro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="pagina-auth">
    <section class="cartao-auth">
      <div class="marca-auth">
        <span class="marca">CF</span>
        <span>Controle Financeiro</span>
      </div>
      <h2>Bem-vindo de volta</h2>
      <p>Entre com seu e-mail e senha para acessar seu painel.</p>

      <form id="formLogin" class="form-auth">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required minlength="6" />
        </div>
        <div class="barra-acoes">
          <button type="submit" class="botao" id="botaoEntrar">Entrar</button>
        </div>
      </form>

      <p class="status-auth" id="statusLogin"></p>

      <div class="separador">ou</div>

      <button type="button" class="botao google" id="botaoGoogle">
        <span aria-hidden="true">🔐</span> Continuar com Google
      </button>

      <p class="rodape-auth">
        Ainda não tem conta? <a href="cadastro.html">Criar conta</a>
      </p>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
