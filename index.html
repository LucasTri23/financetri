<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Controle Financeiro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="pagina-login">
    <section class="cartao">
      <h2>Controle Financeiro</h2>
      <p>Entre com seu e-mail e senha para acessar seu painel.</p>

      <form id="formLogin" class="form-login">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required minlength="6" />
        </div>
        <div class="barra-acoes">
          <button type="submit" class="botao" id="botaoEntrar">Entrar</button>
          <button type="button" class="botao secundario" id="botaoCriarConta">Criar conta</button>
        </div>
      </form>
      <p id="statusLogin" class="status-login"></p>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
