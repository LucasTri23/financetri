<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta — Controle Financeiro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="pagina-auth">
    <section class="cartao-auth">
      <div class="marca-auth">
        <span class="marca">CF</span>
        <span>Controle Financeiro</span>
      </div>
      <h2>Criar conta</h2>
      <p>Preencha os dados abaixo para começar a usar o Controle Financeiro.</p>

      <form id="formCadastro" class="form-auth">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required minlength="6" />
        </div>
        <div class="campo">
          <label for="confirmarSenha">Confirmar senha</label>
          <input type="password" id="confirmarSenha" required minlength="6" />
        </div>
        <div class="barra-acoes">
          <button type="submit" class="botao" id="botaoCriarConta">Criar conta</button>
        </div>
      </form>

      <p class="status-auth" id="statusCadastro"></p>

      <div class="separador">ou</div>

      <button type="button" class="botao google" id="botaoGoogle">
        <span aria-hidden="true">🔐</span> Continuar com Google
      </button>

      <p class="rodape-auth">
        Já tem conta? <a href="index.html">Entrar</a>
      </p>
    </section>
  </main>

  <script type="module" src="js/cadastro.js"></script>
</body>
</html>
